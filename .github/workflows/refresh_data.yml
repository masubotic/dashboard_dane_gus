name: Refresh GUS data

on:
  schedule:
    - cron: "0 6 * * 1"  # każdy poniedziałek o 6:00 UTC
  workflow_dispatch:      # ręczne uruchomienie

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Fetch GUS data
        env:
          GUS_API_KEY: ${{ secrets.GUS_API_KEY }}
        run: uv run python scripts/fetch_gus.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gus_data.parquet data/last_refresh.txt
          git diff --staged --quiet || git commit -m "chore: aktualizacja danych GUS [skip ci]"
          git pull --rebase
          git push
