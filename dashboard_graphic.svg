<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1c2e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00cec9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#81ecec" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fd79a8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e84393" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="barG1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barG2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00cec9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#fd79a8"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedBg">
      <rect x="0" y="0" width="800" height="400" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedBg)">
    <!-- Background -->
    <rect width="800" height="400" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
      <line x1="0" y1="80" x2="800" y2="80"/>
      <line x1="0" y1="160" x2="800" y2="160"/>
      <line x1="0" y1="240" x2="800" y2="240"/>
      <line x1="0" y1="320" x2="800" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="480" y1="0" x2="480" y2="400"/>
      <line x1="640" y1="0" x2="640" y2="400"/>
    </g>

    <!-- Ambient glow orbs -->
    <circle cx="150" cy="120" r="120" fill="#6c5ce7" opacity="0.04" filter="url(#bigGlow)"/>
    <circle cx="650" cy="300" r="100" fill="#00cec9" opacity="0.04" filter="url(#bigGlow)"/>
    <circle cx="500" cy="80" r="80" fill="#fd79a8" opacity="0.03" filter="url(#bigGlow)"/>

    <!-- === LEFT: Abstract bar chart === -->
    <g transform="translate(60, 80)">
      <!-- Bars with gradient -->
      <rect x="0"   y="180" width="22" height="120" rx="4" fill="url(#barG1)" opacity="0.6"/>
      <rect x="32"  y="140" width="22" height="160" rx="4" fill="url(#barG2)" opacity="0.7"/>
      <rect x="64"  y="100" width="22" height="200" rx="4" fill="url(#barG1)" opacity="0.8"/>
      <rect x="96"  y="160" width="22" height="140" rx="4" fill="url(#barG2)" opacity="0.6"/>
      <rect x="128" y="60"  width="22" height="240" rx="4" fill="url(#barG1)" opacity="0.9"/>
      <rect x="160" y="120" width="22" height="180" rx="4" fill="url(#barG2)" opacity="0.7"/>
      <rect x="192" y="40"  width="22" height="260" rx="4" fill="url(#barG1)"/>

      <!-- Glow tops -->
      <circle cx="11"  cy="180" r="3" fill="#6c5ce7" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="43"  cy="140" r="3" fill="#00cec9" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="75"  cy="100" r="3" fill="#6c5ce7" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="107" cy="160" r="3" fill="#00cec9" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="139" cy="60"  r="3" fill="#6c5ce7" opacity="0.9" filter="url(#softGlow)"/>
      <circle cx="171" cy="120" r="3" fill="#00cec9" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="203" cy="40"  r="3" fill="#6c5ce7" opacity="1"   filter="url(#softGlow)"/>
    </g>

    <!-- === CENTER: Flowing trend line === -->
    <g filter="url(#softGlow)">
      <path d="M 280 280 C 320 260, 340 180, 380 200 S 440 140, 480 160 S 540 100, 580 90 S 630 120, 660 80" 
            fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Area fill under the line -->
    <path d="M 280 280 C 320 260, 340 180, 380 200 S 440 140, 480 160 S 540 100, 580 90 S 630 120, 660 80 L 660 340 L 280 340 Z"
          fill="url(#glow2)" opacity="0.06"/>

    <!-- Data points on the line -->
    <circle cx="280" cy="280" r="4" fill="#a78bfa" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="380" cy="200" r="4" fill="#81ecec" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="480" cy="160" r="4" fill="#00cec9" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="580" cy="90"  r="5" fill="#fd79a8" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="660" cy="80"  r="4" fill="#a78bfa" opacity="0.9" filter="url(#softGlow)"/>

    <!-- Dashed target line -->
    <line x1="280" y1="150" x2="660" y2="150" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="6 4"/>

    <!-- === RIGHT TOP: Donut ring === -->
    <g transform="translate(720, 100)">
      <circle cx="0" cy="0" r="52" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="10"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#6c5ce7" stroke-width="10" stroke-dasharray="120 207" stroke-dashoffset="-20" stroke-linecap="round" opacity="0.8" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#00cec9" stroke-width="10" stroke-dasharray="70 257" stroke-dashoffset="-145" stroke-linecap="round" opacity="0.7" filter="url(#softGlow)"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#fd79a8" stroke-width="10" stroke-dasharray="40 287" stroke-dashoffset="-220" stroke-linecap="round" opacity="0.6" filter="url(#softGlow)"/>
      <!-- Center text -->
      <text x="0" y="-6" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">78%</text>
      <text x="0" y="12" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="system-ui, -apple-system, sans-serif" font-size="10">TARGET</text>
    </g>

    <!-- === BOTTOM: Scattered floating particles === -->
    <circle cx="100" cy="350" r="1.5" fill="#6c5ce7" opacity="0.5"/>
    <circle cx="250" cy="370" r="1"   fill="#00cec9" opacity="0.4"/>
    <circle cx="400" cy="360" r="1.5" fill="#fd79a8" opacity="0.3"/>
    <circle cx="550" cy="355" r="1"   fill="#a78bfa" opacity="0.5"/>
    <circle cx="700" cy="365" r="1.5" fill="#81ecec" opacity="0.4"/>
    <circle cx="180" cy="30"  r="1"   fill="#fd79a8" opacity="0.3"/>
    <circle cx="450" cy="25"  r="1.5" fill="#6c5ce7" opacity="0.4"/>
    <circle cx="600" cy="40"  r="1"   fill="#00cec9" opacity="0.3"/>

    <!-- Decorative connecting lines (network feel) -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
      <line x1="280" y1="280" x2="200" y2="340"/>
      <line x1="380" y1="200" x2="350" y2="130"/>
      <line x1="480" y1="160" x2="520" y2="100"/>
      <line x1="580" y1="90"  x2="660" y2="80"/>
      <line x1="660" y1="80"  x2="720" y2="48"/>
    </g>

    <!-- Small accent nodes -->
    <circle cx="350" cy="130" r="2" fill="#a78bfa" opacity="0.3"/>
    <circle cx="520" cy="100" r="2" fill="#00cec9" opacity="0.3"/>
    <circle cx="200" cy="340" r="2" fill="#6c5ce7" opacity="0.2"/>
  </g>
</svg>
