<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cool" x1="0.7" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="inflLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#e74c3c"/>
      <stop offset="55%" stop-color="#f39c12"/>
      <stop offset="80%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="inflFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#f39c12" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="cpiBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="cpiBarLow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wideGlow">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="clip"><rect width="800" height="360" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="800" height="360" fill="url(#bg)"/>

    <!-- Ambient heat zones -->
    <rect x="0" y="0" width="350" height="360" fill="url(#hot)"/>
    <rect x="450" y="0" width="350" height="360" fill="url(#cool)"/>

    <!-- Subtle horizontal guides (like CPI bands) -->
    <g stroke="rgba(255,255,255,0.025)" stroke-width="0.5">
      <line x1="40" y1="90"  x2="760" y2="90"/>
      <line x1="40" y1="150" x2="760" y2="150"/>
      <line x1="40" y1="210" x2="760" y2="210"/>
      <line x1="40" y1="270" x2="760" y2="270"/>
    </g>

    <!-- Inflation target band (2.5% ± 1pp) -->
    <rect x="40" y="168" width="720" height="44" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.035)" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text x="752" y="194" text-anchor="end" fill="rgba(255,255,255,0.1)" font-family="system-ui, -apple-system, sans-serif" font-size="9" letter-spacing="1">CEL 2,5%</text>

    <!-- Background CPI bars (abstract monthly readings) -->
    <g opacity="0.9">
      <rect x="68"  y="105" width="14" height="195" rx="3" fill="url(#cpiBar)"/>
      <rect x="112" y="80"  width="14" height="220" rx="3" fill="url(#cpiBar)"/>
      <rect x="156" y="60"  width="14" height="240" rx="3" fill="url(#cpiBar)"/>
      <rect x="200" y="45"  width="14" height="255" rx="3" fill="url(#cpiBar)"/>
      <rect x="244" y="55"  width="14" height="245" rx="3" fill="url(#cpiBar)"/>
      <rect x="288" y="75"  width="14" height="225" rx="3" fill="url(#cpiBar)"/>
      <rect x="332" y="100" width="14" height="200" rx="3" fill="url(#cpiBar)"/>
      <rect x="376" y="120" width="14" height="180" rx="3" fill="url(#cpiBar)"/>
      <rect x="420" y="140" width="14" height="160" rx="3" fill="url(#cpiBar)"/>
      <rect x="464" y="155" width="14" height="145" rx="3" fill="url(#cpiBarLow)"/>
      <rect x="508" y="165" width="14" height="135" rx="3" fill="url(#cpiBarLow)"/>
      <rect x="552" y="160" width="14" height="140" rx="3" fill="url(#cpiBarLow)"/>
      <rect x="596" y="150" width="14" height="150" rx="3" fill="url(#cpiBarLow)"/>
      <rect x="640" y="155" width="14" height="145" rx="3" fill="url(#cpiBarLow)"/>
      <rect x="684" y="170" width="14" height="130" rx="3" fill="url(#cpiBarLow)"/>
    </g>

    <!-- Main inflation curve -->
    <path d="M 40 200 C 80 195, 100 140, 140 120 S 200 55, 240 70 S 300 85, 340 115 S 400 145, 440 165 S 490 185, 530 188 S 580 180, 620 175 S 670 185, 720 190 L 760 192"
          fill="none" stroke="url(#inflLine)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Area under the curve -->
    <path d="M 40 200 C 80 195, 100 140, 140 120 S 200 55, 240 70 S 300 85, 340 115 S 400 145, 440 165 S 490 185, 530 188 S 580 180, 620 175 S 670 185, 720 190 L 760 192 L 760 300 L 40 300 Z"
          fill="url(#inflFill)" opacity="0.7"/>

    <!-- Peak highlight glow -->
    <circle cx="210" cy="62" r="30" fill="#e74c3c" opacity="0.06" filter="url(#wideGlow)"/>
    <circle cx="210" cy="62" r="4" fill="#e74c3c" opacity="0.7" filter="url(#glow)"/>

    <!-- Key data points -->
    <circle cx="140" cy="120" r="3" fill="#e74c3c" opacity="0.6" filter="url(#glow)"/>
    <circle cx="340" cy="115" r="3" fill="#f39c12" opacity="0.6" filter="url(#glow)"/>
    <circle cx="530" cy="188" r="3" fill="#2ecc71" opacity="0.6" filter="url(#glow)"/>
    <circle cx="720" cy="190" r="3" fill="#2ecc71" opacity="0.5" filter="url(#glow)"/>

    <!-- Floating % labels (ghostly, decorative) -->
    <text x="195" y="48" fill="rgba(231,76,60,0.25)" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">18,4%</text>
    <text x="320" y="105" fill="rgba(243,156,18,0.2)" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">11,5%</text>
    <text x="510" y="178" fill="rgba(46,204,113,0.2)" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">3,7%</text>
    <text x="698" y="180" fill="rgba(46,204,113,0.15)" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">4,2%</text>

    <!-- Large decorative "zł" watermark -->
    <text x="680" y="340" fill="rgba(255,255,255,0.025)" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700">zł</text>

    <!-- Subtle arrow motifs (price direction) -->
    <g stroke="rgba(231,76,60,0.12)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="60,330 60,315 68,323"/>
      <polyline points="82,335 82,318 90,326"/>
    </g>
    <g stroke="rgba(46,204,113,0.1)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="730,320 730,335 738,327"/>
      <polyline points="710,315 710,330 718,322"/>
    </g>

    <!-- Tiny floating particles -->
    <circle cx="90"  cy="55"  r="1" fill="#e74c3c" opacity="0.3"/>
    <circle cx="310" cy="35"  r="1" fill="#f39c12" opacity="0.25"/>
    <circle cx="470" cy="50"  r="1" fill="#2ecc71" opacity="0.2"/>
    <circle cx="630" cy="45"  r="1" fill="#2ecc71" opacity="0.2"/>
    <circle cx="175" cy="330" r="1" fill="#e74c3c" opacity="0.15"/>
    <circle cx="400" cy="340" r="1" fill="#f39c12" opacity="0.12"/>
    <circle cx="580" cy="330" r="1" fill="#2ecc71" opacity="0.15"/>
  </g>
</svg>
